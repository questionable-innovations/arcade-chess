; ISP provisioning project — deliberately separate from the main firmware so the
; editor sidebar's Project Tasks does not list these fuse/bootloader-burning
; environments alongside the normal build. tools/provision-quadrant.sh runs them:
;
;   pio run -d firmware-atmega/provisioning -e fuses_bootloader -t bootloader
;
; These envs only burn fuses/lock bits and (optionally) Urboot over a USBasp
; programmer; the application itself is built and flashed from the main project.
; They are standalone (not extending the main env) so no build/library settings
; leak in — only what MiniCore needs to compute fuses and place the bootloader.

[env]
platform = atmelavr
board = ATmega328PB
framework = arduino
board_build.f_cpu = 16000000L
board_hardware.oscillator = external
board_hardware.bod = 2.7v
board_hardware.eesave = yes
upload_protocol = usbasp
upload_flags = -B8

[env:fuses_isp]
board_bootloader.type = no_bootloader

[env:fuses_bootloader]
board_bootloader.type = urboot
board_bootloader.speed = 115200
; Hardware-boot urboot at 0x7E00: BOOTRST must be programmed (hfuse 0xD6 keeps
; EESAVE and selects a 256-word boot section) and the boot section lock-protected.
board_bootloader.file = ${platformio.packages_dir}/framework-arduino-avr-minicore/bootloaders/urboot/atmega328pb/watchdog_1_s/autobaud/uart0_rxd0_txd1/no-led/urboot_atmega328pb_ee_ce_hw.hex
board_bootloader.hfuse = 0xD6
board_bootloader.lock_bits = 0x0F
board_bootloader.unlock_bits = 0x3F
board_hardware.uart = uart0
