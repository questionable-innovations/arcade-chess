; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ATmega328PB]
platform = atmelavr
board = ATmega328PB
framework = arduino
board_build.f_cpu = 16000000L
; Application area ends at the 256-word urboot boot section (0x7E00).
board_upload.maximum_size = 32256
lib_deps =
  fastled/FastLED@^3.10.3
  ArcadeProtocol=symlink://../protocol
build_flags =
  -Wall
  -Wextra
  -Werror=return-type
  -D ARCADE_FW_MAJOR=0
  -D ARCADE_FW_MINOR=1
  -D ARCADE_FW_PATCH=0
monitor_speed = 38400
extra_scripts = ../tools/pio-targets.py

[env:bringup_ascii]
extends = env:ATmega328PB
build_flags =
  ${env:ATmega328PB.build_flags}
  -D ARCADE_STANDALONE_ASCII_DEBUG=1
; Bring-up is flashed through an Arduino running the ArduinoISP sketch.
; Without these overrides, the board default (`urclock` at 115200 baud) talks
; to the programmer's own ATmega328P bootloader instead of its ISP target.
upload_protocol = arduino_as_isp
upload_speed = 19200

; The ISP fuse/bootloader-burning environments live in the separate
; provisioning/ project so they stay out of this project's sidebar tasks.
; tools/provision-quadrant.sh runs them; edit fuse/lock/bootloader settings in
; provisioning/platformio.ini.
